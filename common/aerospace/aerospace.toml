config-version = 2

start-at-login = true
default-root-container-layout = "tiles"
persistent-workspaces = ["A", "S", "D", "Z", "X", "C"]

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

[workspace-to-monitor-force-assignment]
A = "secondary"
S = "secondary"
D = "secondary"
Z = "main"
X = "main"
C = "main"

[[on-window-detected]]
check-further-callbacks = true
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = ["layout tiling", "move-node-to-workspace A"]

[[on-window-detected]]
if.app-id = "com.github.wez.wezterm"
run = ["layout tiling", "move-node-to-workspace S"]

[[on-window-detected]]
if.app-id = "notion.id"
run = ["layout tiling", "move-node-to-workspace Z"]

[mode.main.binding]
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-shift-f = "layout floating tiling"
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"
alt-tab = "focus-back-and-forth"
alt-f = "fullscreen"
alt-a = "workspace A"
alt-s = "workspace S"
alt-d = "workspace D"
alt-z = "workspace Z"
alt-x = "workspace X"
alt-c = "workspace C"
alt-n = "workspace --wrap-around next"
alt-p = "workspace --wrap-around prev"

alt-cmd-h = "focus-monitor left"
alt-cmd-l = "focus-monitor right"
alt-cmd-j = "focus-monitor down"
alt-cmd-k = "focus-monitor up"

alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-shift-a = "move-node-to-workspace --focus-follows-window A"
alt-shift-s = "move-node-to-workspace --focus-follows-window S"
alt-shift-d = "move-node-to-workspace --focus-follows-window D"
alt-shift-z = "move-node-to-workspace --focus-follows-window Z"
alt-shift-x = "move-node-to-workspace --focus-follows-window X"
alt-shift-c = "move-node-to-workspace --focus-follows-window C"

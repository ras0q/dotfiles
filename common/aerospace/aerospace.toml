config-version = 2

start-at-login = true
default-root-container-layout = "tiles"
persistent-workspaces = ["1", "2", "3", "a", "b", "c"]

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

[workspace-to-monitor-force-assignment]
1 = "main"
2 = "main"
3 = "main"
a = "secondary"  # Terminal
b = "secondary"  # Browser
c = "secondary"

[[on-window-detected]]
check-further-callbacks = true
run = "layout floating"

[[on-window-detected]]
if.app-id = "com.github.wez.wezterm"
run = ["layout tiling", "move-node-to-workspace a"]

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = ["layout tiling", "move-node-to-workspace b"]

[mode.main.binding]
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-shift-f = "layout floating tiling"

alt-tab = "focus-back-and-forth"
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-a = "workspace a"
alt-b = "workspace b"
alt-c = "workspace c"
alt-n = "workspace next"
alt-p = "workspace prev"
alt-shift-1 = "move-node-to-workspace --focus-follows-window 1"
alt-shift-2 = "move-node-to-workspace --focus-follows-window 2"
alt-shift-3 = "move-node-to-workspace --focus-follows-window 3"
alt-shift-a = "move-node-to-workspace --focus-follows-window a"
alt-shift-b = "move-node-to-workspace --focus-follows-window b"
alt-shift-c = "move-node-to-workspace --focus-follows-window c"
